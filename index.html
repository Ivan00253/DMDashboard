<html lang="es">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="/js/libs/bootstrap.min.js"></script>
    <script src="/js/index.js" type="module"></script>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="dark">
    <title>DM Dashboard</title>
    <div class="container">

        <!-- Cabecera -->
        <div class="row mb-5 mt-3">
            <div class="col-md-7 text-center">
                <h5><u>Criaturas y Estadisticas</u></h5>
            </div>
            <div class="col-md-1 col-md-offset-1"></div>
            <div class="col-md-4 text-center">
                <h5><u>Iniciativas</u></h5>
            </div>
        </div>

        <!-- Display criaturas e iniciativas -->
        <div class="row">
            <div class="col-md-7 bg-dark rounded"
                style="position: relative; min-height: 38px;" id="stats">
                <button class="btn btn-success" id="add-cr" style="position: absolute; top:0;right: -90px;" data-bs-toggle="modal" data-bs-target="#crModal">Añadir <i
                        class="fa-solid fa-plus"></i></button>
            </div>

            <div class="col-md-1 col-md-offset-1"></div>

            <div class="col-md-4 bg-dark rounded" style="position: relative; min-height: 38px;" id="iniciativa">
                <button class="btn btn-success" id="add-cr" style="position: absolute; top:0;right: -90px;" data-bs-toggle="modal" data-bs-target="#iniModal">Añadir <i
                        class="fa-solid fa-plus"></i></button>
            </div>
        </div>

        <!-- Modales -->
        <div class="modal fade" id="crModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content bg-dark text-white">

                    <div class="modal-header">
                        <h5 class="modal-title">Nueva criatura</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>

                    <form id="form-cr">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombre" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Vida</label>
                                <input type="number" name="vida" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Enlace Statblock</label>
                                <input type="url" name="statBlock" class="form-control">
                            </div>
                        </div>
                        
                        <div class="modal-footer">
                            <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            <button class="btn btn-success" type="submit" id="guardar-criatura">Guardar</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>

        <div class="modal fade" id="iniModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content bg-dark text-white">

                    <div class="modal-header">
                        <h5 class="modal-title">Nueva iniciativa</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>

                    <form id="form-ini">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombre" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Iniciativa</label>
                                <input type="number" name="ini" class="form-control">
                            </div>
                        </div>
                        
                        <div class="modal-footer">
                            <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            <button class="btn btn-success" type="submit" id="guardar-iniciativa">Guardar</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</body>

</html>
